<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gerenciamento de ponto e funcionários">
    <meta name="keywords" content="ponto eletrônico, gestão de funcionários, recursos humanos">
    <meta name="author" content="Aldenir Luiz">
    <title>Gerenciamento de Funcionarios</title>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <link rel="icon" type="image/png" sizes="128x128" href="./src/favicon-128.ico">
    
    <!-- Preload de recursos críticos -->
    <link rel="preload" href="./css/styles.css" as="style">
    <link rel="preload" href="./js/reports.js" as="script">

    <link rel="stylesheet" href="./css/employees-styles.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/secondary-header.css">
    <link rel="stylesheet" href="./css/table-styles.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9041954249034519"
     crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <section class="header-group">
            <div class="header-column">
                <img src="src/logo-omeetri.png" alt="onmeetri-logo" srcset="" width="180">
            </div>
            <div class="header-column">
                <h1>Gerenciamento de Funcionarios</h1><legend style="color: crimson; font-weight:bolder;">BETA!</legend>
            </div>
            <div class="header-column">
                <h3 class="dateNow" id="mainClock"></h3>
                <h3 class="dateNow" id="dateClock"></h3>
            </div>
            <div class="hamburger" id="hamburger">☰</div>
            <nav class="header-nav" id="header-nav">
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./adm-point.html">Sistema de ponto</a></li>
                    <li><a href="./reports.html">Relatorios</a></li>
                    <li><a href="./settings.html">Configuracoes</a></li>
                </ul>
            </nav>
        </section>
        
    </header>
    <main>
        <section class="main-container">
            <div class="form-card">
                <h2>Adicionar/Editar Funcionário</h2>
                <form class="form">
                    <div class="form-fields">
                        <div class="form-field">
                            <label for="name">Nome</label>
                            <input type="text" id="name" placeholder="Nome do Funcionário">
                        </div>

                        <div class="form-field">
                            <label for="cargo">Cargo</label>
                            <input type="text" id="cargo" placeholder="Cargo do Funcionário">
                        </div>

                        <div class="form-field">
                            <label for="dept">Departamento</label>
                            <input type="text" id="dept" placeholder="Departamento">
                        </div>

                        <div class="form-field">
                            <label for="salario">Salário</label>
                            <input type="text" id="salario" placeholder="Salário do Funcionário">
                        </div>

                        <div class="form-field">
                            <label for="contrato">Contrato</label>
                            <input type="text" id="contrato" placeholder="CLT / PJ / Estágio / Outros">
                        </div>

                        <div class="form-field">
                            <label for="admission">Admissão</label>
                            <input type="date" id="admission" placeholder="Data de Admissão">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" id="form-btt-save" class="btn-save">SALVAR</button>
                        <button type="button" id="form-btt-clear" class="btn-clear">LIMPAR</button>
                    </div>
                </form>
            </div>
        </section>
        <section class="main-container-table">
            <fieldset class="table-fieldset"><legend>Lista de Funcionarios</legend>
                <div style="margin-bottom: 10px; text-align: right;">
                    <input type="text" id="searchInput" placeholder="Buscar por nome, cargo ou departamento..." style="width: 300px; padding: 5px; border-radius: 5px; border: 1px solid lightslategray;">
                </div>

                <!-- Desktop Table View -->
                <div class="desktop-view">
                    <table class="table">
                        <thead>
                            <tr>
                                <th class="name" id="employee-name">Nome</th>
                                <th id="employee-role">Cargo</th>
                                <th id="employee-department">Departamento</th>
                                <th id="employee-salary">Salario</th>
                                <th id="employee-contract">Contrato</th>
                                <th id="employee-admission">Admissao</th>
                            </tr>
                        </thead>
                        <tbody id="employee-list">
                            <!-- Lista de funcionarios sera preenchida aqui -->
                            <tr>
                                
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Mobile Cards View -->
                <div class="mobile-view">
                    <div id="employee-cards" class="employee-cards">
                        <!-- Cards will be populated by JavaScript -->
                    </div>
                </div>
            </fieldset>
        </section>
    </main>
    <script src="./js/mobile-nav.js"></script>
</body>
<script src="./js/script-adm-employees.js"></script>
<script src="./js/sample-data.js"></script>
</html>
