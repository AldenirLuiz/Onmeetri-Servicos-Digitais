<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gerenciamento de ponto e funcionários">
    <meta name="keywords" content="ponto eletrônico, gestão de funcionários, recursos humanos">
    <meta name="author" content="Seu Nome">
    
    <title>Relatórios e Métricas | Sistema de Ponto</title>
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./src/favicon.ico">
    
    <!-- Preload de recursos críticos -->
    <link rel="preload" href="./css/styles.css" as="style">
    <link rel="preload" href="./js/reports.js" as="script">
    
    <!-- CSS -->
    <link rel="stylesheet" href="./css/reports-styles.css">
    <link rel="stylesheet" href="./css/secondary-header.css">
    <link rel="stylesheet" href="./css/table-styles.css">
    
    <!-- Scripts carregados de forma otimizada -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js" defer></script>
    <script src="js/reports.js" defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9041954249034519" crossorigin="anonymous"></script>
</head>
<body>  
    <header>
        <section class="header-group">
            <div class="header-column">
                <img src="src/logo-omeetri.png" alt="onmeetri-logo" srcset="" width="200">
            </div>
            <div class="header-column">
                <h1>Relatórios e Métricas</h1><legend style="color: crimson; font-weight:bolder;">BETA!</legend>
            </div>
            <div class="header-column">
                <h3 class="dateNow" id="mainClock"></h3>
                <h3 class="dateNow" id="dateClock"></h3>
            </div>
        </section>
        <nav class="header-nav">
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./adm-point.html">Sistema de ponto</a></li>
                <li><a href="./adm-employees.html">Funcionários</a></li>
                <li><a href="./settings.html">Configuracoes</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="main-container-form" style="flex-direction: column;">
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 8px; justify-content: center;">
                    
                    <select id="report-type" style="border: none; border-bottom: 2px solid #ccc; padding: 8px; font-size: 16px; background-color: transparent;">
                        <option value="employees">Relatório de Funcionários</option>
                        <option value="presence">Relatório de Presença</option>
                    </select>
                    <select id="filter-field" style="border: none; border-bottom: 2px solid #ccc; padding: 8px; font-size: 16px; background-color: transparent;">
                        <option value="contrato">Filtrar por Contrato</option>
                        <option value="departamento">Filtrar por Departamento</option>
                        <option value="cargo">Filtrar por Cargo</option>
                    </select>
                    <select id="filter-value" default="Todos" style="border: none; border-bottom: 2px solid #ccc; padding: 8px; font-size: 16px; background-color: transparent;">
                        <option value="">Todos</option>
                    </select>
                    <select id="chart-group" default="Chart por Cargo" style="border: none; border-bottom: 2px solid #ccc; padding: 8px; font-size: 16px; background-color: transparent;">
                        <option value="cargo">Chart por Cargo</option>
                        <option value="departamento">Chart por Departamento</option>
                    </select>
                    <select id="sort-by" style="border: none; border-bottom: 2px solid #ccc; padding: 8px; font-size: 16px; background-color: transparent;">
                        <option value="">Ordenar por</option>
                        <option value="salario">Salário / Presença</option>
                        <option value="admissao">Admissão / Registros</option>
                    </select>
                </div>
            <fieldset style="width: 100%; max-width: 1100px;">
                <legend>Métricas</legend>
                <div id="metrics-container">
                    <p><strong id="metric-1-label">Total de Funcionários:</strong> <span id="total-funcionarios">0</span></p>
                    <p><strong id="metric-2-label">Média Salarial:</strong> <span id="media-salarial">R$ 0,00</span></p>
                </div>

                <div class="main-container-table" style="margin-top: 20px;">
                    <div style="display: flex; flex-direction: row; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 40px;">
                <div style="width: 350px;">
                    <h3 id="chart1-title" style="text-align: center;">Funcionários por Departamento</h3>
                    <canvas id="departamentoChart"></canvas>
                </div>
                <div style="width: 350px;">
                    <h3 id="chart2-title" style="text-align: center;">Distribuição Salarial</h3>
                    <canvas id="salarioChart"></canvas>
                </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Cargo</th>
                                <th>Departamento</th>
                                <th>Salário</th>
                                <th>Contrato</th>
                                <th>Admissão</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body">
                            <!-- Linhas populadas via JS -->
                        </tbody>
                    </table>
                    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; justify-content: center;">
                        <button id="export-pdf">Exportar PDF</button>
                        <button id="export-excel">Exportar Excel</button>
                    </div>
                </div>
            </fieldset>
            
        </section>
    </main>

    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-9041954249034519"
             data-ad-slot="seu-ad-slot"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
</body>
</html>
